name: Update PR

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited

concurrency:
  cancel-in-progress: false
  group: '${{ github.workflow }}-${{ github.ref_name }}'

jobs:
  pull-request:
    name: Pull Request
    uses: cupel-co/workflows/.github/workflows/pull-request.update.yml@0394f9ca26a35588882d4254f6c114b38861bacc
    permissions:
      issues: read
      pull-requests: write
      repository-projects: read
    with:
      environment: Production
