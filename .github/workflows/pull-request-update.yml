name: Update PR

on:
  pull_request:
    types:
      - opened
      - reopened

concurrency:
  cancel-in-progress: false
  group: '${{ github.workflow }}-${{ github.ref_name }}'

jobs:
  pull-request:
    name: Pull Request
    uses: cupel-co/workflows/.github/workflows/pull-request.update.yml@90206ef2c0f1c41fc9166fff3dba678e66277667
    permissions:
      issues: read
      pull-requests: write
      repository-projects: read
    with:
      environment: Preview
