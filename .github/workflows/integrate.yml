name: Integrate

on:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: false
  group: '${{ github.workflow }}-${{ github.ref_name }}'

jobs:
  version:
    name: Version
    uses: cupel-co/workflows/.github/workflows/version.generate.yml@0394f9ca26a35588882d4254f6c114b38861bacc
    permissions:
      contents: read

  release:
    name: Release
    uses: cupel-co/workflows/.github/workflows/release.create.yml@0394f9ca26a35588882d4254f6c114b38861bacc
    needs:
      - version
    permissions:
      contents: write
    with:
      tag: "v${{ needs.version.outputs.sem-ver }}"
    secrets:
      google-chat-webhook-url: '${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}'
      gpg-private-key: "${{ secrets.GH_GPG_PRIVATE_KEY }}"
      gpg-private-key-password: "${{ secrets.GH_GPG_PRIVATE_KEY_PASSWORD }}"
      token: "${{ secrets.GH_RELEASE_PAT }}"
